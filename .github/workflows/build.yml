name: Build and Release
on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
      - name: install dependencies
        run: npm install
      - name: setup rust
        uses: dtolnay/rust-toolchain@stable
      - name: build tauri
        run: npx tauri build
      - name: Rename and Move Assets
        run: |
          mkdir release_assets
          Copy-Item "src-tauri/target/release/bundle/msi/*.msi" -Destination "release_assets/Win7Simu_Offline_Installer.msi"
      - name: upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-app
          path: release_assets/Win7Simu_Offline_Installer.msi

  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
      - name: install dependencies
        run: |
          npm install
          npm install @capacitor/cli @capacitor/core @capacitor/android
      - name: setup java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
      - name: build android
        run: |
          npx cap add android
          npx cap copy android
          cd android && ./gradlew assembleDebug
          cp app/build/outputs/apk/debug/app-debug.apk ../Win7Simu_Offline.apk
      - name: upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-app
          path: Win7Simu_Offline.apk

  build-web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
      - name: build (dummy step since it's already static)
        run: echo "Static site ready"
      - name: deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: .
          force_orphan: true

  release:
    needs: [build-windows, build-android, build-web]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.run_number }}
          name: Win7 Simu Offline v${{ github.run_number }}
          body: |
            ## Win7 Simu Offline - Universal Release
            
            This release includes builds for all supported platforms:
            - **Web**: [Hosted on GitHub Pages](https://giangnam0201.github.io/win7-simu-offline/)
            - **Windows**: Download the `.msi` below for the desktop experience.
            - **Android**: Download the `.apk` below for your phone.
            
            **Modifications**:
            - Fully Offline Compatible
            - Ads & Third-party trackers removed
            - Premium Features enabled
            - Credits: giangnam0201 & Antigravity
          files: |
            artifacts/windows-app/Win7Simu_Offline_Installer.msi
            artifacts/android-app/Win7Simu_Offline.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
